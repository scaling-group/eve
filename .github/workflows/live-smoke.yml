name: EvE Config Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  eve-config-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --group dev --locked
      - run: |
          uv run python - <<'PY'
          from pathlib import Path

          from hydra import compose, initialize_config_dir

          config_dir = str((Path.cwd() / "configs" / "eve").resolve())
          for config_path in sorted((Path.cwd() / "configs" / "eve").glob("*.yaml")):
              with initialize_config_dir(config_dir=config_dir, version_base=None):
                  compose(config_name=config_path.stem)
              print(f"composed {config_path.name}")
          PY
