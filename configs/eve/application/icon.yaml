# @package _global_
# ICON PE application definition.

application:
  name: icon-pe
  # ADAPT: fork the ICON core repo, overlay examples/icon/, then set
  # this URL to the fork that contains the overlay commit.
  github_url: https://github.com/YOUR_USER/your-icon-core-fork
  # ADAPT: pin this to the commit in your fork that contains examples/icon/.
  commit: YOUR_FORK_COMMIT_SHA
  editable:
    files:
      - configs/experiment/evolve_base.yaml
      - configs/model/icon_evolve.yaml
      - src/models/icon/icon_evolve.py
      - src/models/base/transformer_evolve.py
      - src/models/icon/pe_evolve.py
    folders: []
  boundary_failure_score:
    score: -10.0
    summary: boundary check failed
