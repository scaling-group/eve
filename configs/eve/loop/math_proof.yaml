# @package _global_
# Eve loop defaults for math-proof tasks.

loop:
  max_iterations: 25
  n_workers_phase2: 2
  n_solver_examples_phase2: 4
  n_optimizer_examples_phase2: 4  # See `_build_worker_optimizer_examples`.
  exclude_all_working_optimizers_from_examples: true
  produce_optimizer_in_phase2: ${loop.n_workers_phase2}
  boundary_repair_attempts: 3
  enable_resume: true  # write checkpoints and lineage snapshots for same-run resume
  sampling:
    # From: full optimizer population. Sample: `n_workers_phase2`. To: one
    # optimizer assigned to each Phase 2 worker.
    working_optimizer:
      _target_: scaling_evolve.algorithms.eve.populations.samplers.rank_softmax.RankSoftmaxSampler
      temperature: 1.0
      replacement_mode: auto
    # From: full solver population. Sample: `n_solver_examples_phase2`. To:
    # `solver_examples/` in each Phase 2 worker workspace.
    solver_examples:
      _target_: scaling_evolve.algorithms.eve.populations.samplers.rank_softmax.EvalRankSoftmaxSampler
      expression: ${evaluation.scalar_score_expression}
      temperature: 1.0
      replacement_mode: no_replacement
    # From: sampled solver examples. Sample: 1. To: initial `solver/` contents
    # in each Phase 2 worker workspace.
    solver_prefill:
      _target_: scaling_evolve.algorithms.eve.populations.samplers.rank_softmax.EvalRankSoftmaxSampler
      expression: ${evaluation.scalar_score_expression}
      temperature: 1.0
      replacement_mode: no_replacement
    # From: optimizer population, optionally excluding this iteration's
    # assigned worker optimizers. Sample: `n_optimizer_examples_phase2 - 1`
    # shared reference optimizers. To: `guidance_examples/` in each Phase 2
    # worker workspace. The workspace's working optimizer is also added to
    # `guidance_examples/` whenever `n_optimizer_examples_phase2 > 0`.
    optimizer_examples:
      _target_: scaling_evolve.algorithms.eve.populations.samplers.rank_softmax.RankSoftmaxSampler
      temperature: 1.0
      replacement_mode: no_replacement
    # From: optimizer candidates produced in this Phase 2 iteration. Sample:
    # `produce_optimizer_in_phase2`. To: optimizer population.
    produced_optimizers:
      _target_: scaling_evolve.algorithms.eve.populations.samplers.rank_softmax.RankExponentialSumSampler
      features:
        dimensions:
          coverage:
            weight: 0.40
            temperature: 1.0
          correctness:
            weight: 0.30
            temperature: 1.0
          dependency:
            weight: 0.15
            temperature: 1.0
          strategy:
            weight: 0.10
            temperature: 1.0
          clarity:
            weight: 0.05
            temperature: 1.0
      replacement_mode: no_replacement
  workspace_root: ${run_root}
  artifact_root: ${loop.workspace_root}/artifacts
  solver_db_path: ${loop.workspace_root}/solver_lineage.db
  optimizer_db_path: ${loop.workspace_root}/optimizer_lineage.db
