# @package _global_
# Work-recommended driver: codex non-interactive + stable gpt-5.4 + xhigh reasoning.
# All behavior-relevant fields declared explicitly — no reliance on defaults.
# Companion: max_interactive.yaml (same config but via codex tmux).

driver:
  driver: codex_exec
  executable: codex
  model: gpt-5.4
  reasoning_effort: xhigh
  rollout_max_turns: 10000
  budget_prompt: false
  web_search: live
  timeout_seconds: 3600
  overrides:
    solver:
      reasoning_effort: xhigh
    eval:
      model: gpt-5.4
      reasoning_effort: xhigh
    optimizer:
      reasoning_effort: xhigh
