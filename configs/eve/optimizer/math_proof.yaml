# @package _global_
# Math-proof optimizer definition using core's standard Eve worker scaffold.

optimizer:
  initial_guidance: configs/eve/optimizer/math_proof/initial_guidance
  workers:
    selection: random
    items:
      - name: normal
        weight: 1.0
        immutable: configs/eve/optimizer/math_proof/immutable
        prompt: configs/eve/optimizer/math_proof/prompt
      - name: exploratory
        weight: 1.0
        immutable: configs/eve/optimizer/math_proof/immutable
        prompt: configs/eve/optimizer/math_proof/prompt_exploratory
  immutable_renderer:
    _target_: scaling_evolve.algorithms.eve.workspace.immutable_renderers.default.DefaultRenderer
  evaluation:
    _target_: scaling_evolve.algorithms.eve.populations.evaluators.elo.EvalScalarEloEvaluator
    expression: ${evaluation.scalar_score_expression}
    k_factor: 32.0
    initial_score:
      elo: 1500.0

driver:
  overrides:
    solver:
      system_prompt_file: configs/eve/optimizer/math_proof/prompt/CODEX_SYSTEM_PROMPT.md
