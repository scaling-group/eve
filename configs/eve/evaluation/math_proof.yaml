# @package _global_
# Math-proof evaluator assets adapted from the latest EvE-Prover to core's
# current judge-step interface.

evaluation:
  steps:
    - immutable: configs/eve/evaluation/math_proof/immutable
      prompt: configs/eve/evaluation/math_proof/prompt
  immutable_renderer:
    _target_: scaling_evolve.algorithms.eve.workspace.immutable_renderers.default.DefaultRenderer
  include_solver_examples: true
  scalar_score_expression: >-
    min(
      score["dimensions"]["coverage"],
      score["dimensions"]["correctness"],
      score["dimensions"]["coverage"] * 0.4 +
      score["dimensions"]["correctness"] * 0.3 +
      score["dimensions"]["dependency"] * 0.15 +
      score["dimensions"]["strategy"] * 0.10 +
      score["dimensions"]["clarity"] * 0.05
    )
  failure_score:
    dimensions:
      coverage: 0.0
      correctness: 0.0
      dependency: 0.0
      clarity: 0.0
      strategy: 0.0
  seed_solver_score:
    dimensions:
      coverage: 0.0
      correctness: 0.0
      dependency: 0.0
      clarity: 0.0
      strategy: 0.0
  seed_solver_skip_evaluation: true

driver:
  overrides:
    eval:
      system_prompt_file: configs/eve/evaluation/math_proof/prompt/CODEX_SYSTEM_PROMPT.md
